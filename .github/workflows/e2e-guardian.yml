name: E2E Checkout Guardian

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies
      run: |
        npm install
        cd backend && npm install
        cd ../frontend && npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Setup Local Environment
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres" > backend/.env
        echo "JWT_SECRET=super-secret-test-jwt" >> backend/.env
        echo "FRONTEND_URL=http://localhost:5173" >> backend/.env
        echo "APP_URL=http://localhost:3000" >> backend/.env
        echo "SUPABASE_URL=http://localhost:8000" >> backend/.env
        echo "SUPABASE_SERVICE_ROLE_KEY=test-key" >> backend/.env

        echo "VITE_API_URL=http://localhost:3000" > frontend/.env
        echo "VITE_SUPABASE_URL=http://localhost:8000" >> frontend/.env
        echo "VITE_SUPABASE_ANON_KEY=test-key" >> frontend/.env

    - name: Setup Database (Prisma)
      run: |
        # In a real scenario, this would use a test DB. 
        # For CI, we either start a Postgres container or use mocking.
        # Since we just want to ensure it compiles and the basic UI flow isn't broken:
        cd backend && npx prisma generate

    - name: Run E2E Guardian (Carrinho Validation)
      run: npx playwright test e2e/validar-carrinho.spec.ts
      # We only run the checkout vital test for the Guardian.
      # Other tests can run on a nightly cron if they are flaky.

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
