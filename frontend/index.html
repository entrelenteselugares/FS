<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Infraestrutura fotográfica de alto padrão. Agende seu evento e receba suas memórias com qualidade editorial e agilidade recorde." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <title>Foto Segundo | Suas memórias, entregues agora.</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_ID%', {
        send_page_view: false // Desativamos o automático pois usamos React Router para disparar manualmente
      });
    </script>
    <!-- Mercado Pago SDK -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script>
      (function() {
        // Forçamos DARK THEME para garantir a estética Midnight Luxury em todos os dispositivos/testes
        document.documentElement.setAttribute("data-theme", "dark");
        document.documentElement.classList.add("dark");
        localStorage.setItem("fs_theme", "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
